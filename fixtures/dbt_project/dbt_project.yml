# The hero analytics dbt project (also the V3 sandbox fixture).
#
# This project shows the flagship failure: the `orders` mart references
# `customer_id`, which drifts upstream to `cust_id`, so a real `dbt build` emits:
#   column "customer_id" does not exist.
# That is exactly the error in ../schema_drift_failure.json.
#
# From V3+ it is compiled/run inside the verification sandbox; from the Seam-3
# hero pipeline (docs/design/HERO-PIPELINE.md) it is also the live dbt project
# the `analytics_daily` Airflow DAG runs against the warehouse.

name: analytics
version: "1.0.0"
config-version: 2
profile: analytics

model-paths: ["models"]

models:
  analytics:
    staging:
      +materialized: view
    marts:
      +materialized: view
