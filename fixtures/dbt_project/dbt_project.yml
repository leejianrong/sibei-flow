# Minimal fixture dbt project (illustrative for V1).
#
# V1 does not execute dbt — it proves the durable spine from a failure payload.
# This project shows the *shape* of the flagship failure: the `orders` model
# references `customer_id`, which has been renamed upstream to `customer_key`,
# so a real `dbt build` would emit:  column "customer_id" does not exist.
# That is exactly the error in ../schema_drift_failure.json.
#
# From V3+ this project is compiled/run inside the sandbox; for now it is the
# canned source of the demo failure.

name: analytics
version: "1.0.0"
config-version: 2
profile: analytics

model-paths: ["models"]

models:
  analytics:
    marts:
      +materialized: view
