# sibei-flow V1 — one `docker compose up` brings up the whole spine:
# postgres (source of truth) + brain (Rust) + worker (Python).
# ADR-0009 / R1.1 / V1-plan §"Packaging".

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sibei
      POSTGRES_PASSWORD: sibei
      POSTGRES_DB: sibei
    ports:
      # Host 5455 → container 5432 (avoids clashes with other local Postgres instances).
      - "5455:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibei -d sibei"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  brain:
    build:
      context: ./brain
    environment:
      DATABASE_URL: postgres://sibei:sibei@postgres:5432/sibei
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info,brain=info,sqlx=warn
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # V2: fixture warehouse (post-rename upstream) for get_schema drift detection.
  warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: sibei
      POSTGRES_PASSWORD: sibei
      POSTGRES_DB: warehouse
    ports:
      # Host 5456 → container 5432 (avoids clashes with other local Postgres).
      - "5456:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibei -d warehouse"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - whdata:/var/lib/postgresql/data
      - ./db/warehouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  worker:
    build:
      # Context is the repo root so the image can ship ./sandbox for lazy image
      # pre-bake; the worker Dockerfile lives under ./worker.
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgres://sibei:sibei@postgres:5432/sibei
      LEASE_SECONDS: "60"
      POLL_INTERVAL: "2.0"
      # V2 agent loop config
      WAREHOUSE_URL: postgres://sbflow_ro:sbflow_ro@warehouse:5432/warehouse
      REPO_ROOT: /repo
      LLM_PROVIDER: replay
      LLM_MODEL: claude-opus-4-8
      MAX_TURNS: "6"
      # V3 tiered verification sandbox (ADR-0006, B-S2).
      SANDBOX_IMAGE: sbflow-sandbox:latest
      SANDBOX_NETWORK: sibei-flow_default        # reach the warehouse from the sandbox
      SANDBOX_WORK_DIR: /tmp/sbflow-sandbox       # bind-mounted at the same host path
      SANDBOX_TIMEOUT: "120"
      # Tier-2: writable read-only DEV/SAMPLE connection (never prod). Comment
      # this out to demo the honest "sample run: not configured" disclosure.
      SAMPLE_WAREHOUSE_URL: postgres://sbflow_dev:sbflow_dev@warehouse:5432/warehouse
      SAMPLE_LIMIT: "10000"
    volumes:
      # Read-only checkout the agent reads failing source from (N7).
      - ./fixtures/dbt_project:/repo:ro
      # Docker-out-of-Docker: launch ephemeral sandbox containers on the host
      # daemon. The work dir is bind-mounted at the SAME absolute path so
      # `docker run -v <hostpath>:/project` resolves on the daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/sbflow-sandbox:/tmp/sbflow-sandbox
    depends_on:
      postgres:
        condition: service_healthy
      warehouse:
        condition: service_healthy
      brain:
        condition: service_started

  # --- Hero pipeline (Seam-3 harness, docs/design/HERO-PIPELINE.md) ---------
  # Everything below only starts under `docker compose --profile hero up`, so the
  # core stack stays lean. It stands up a real Airflow + dbt pipeline that
  # produces the flagship schema-drift failure and drives sibei-flow's loop live.

  # Airflow's own metadata DB (dedicated; never touches the state/warehouse DBs).
  airflow-db:
    profiles: ["hero"]
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - airflowdb:/var/lib/postgresql/data

  # Single-container Airflow (standalone). dbt lives in an isolated venv baked
  # into the image; the DAG's BashOperators call it. The one-line enrollment
  # (on_failure_callback) POSTs failures to the brain's webhook.
  airflow:
    profiles: ["hero"]
    build:
      context: ./hero/airflow
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      # Deterministic local admin (demo only) — visit the UI at localhost:8081.
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      # Enrollment (read by the fixtures on_failure_callback).
      SBFLOW_WEBHOOK_URL: http://brain:8080/webhook
      SBFLOW_REPO: acme/analytics
      SBFLOW_ADAPTER: postgres
      # dbt → warehouse (the pipeline's own analytics_app role, not sibei-flow's).
      SBFLOW_WH_HOST: warehouse
      SBFLOW_WH_PORT: "5432"
      SBFLOW_WH_DB: warehouse
      ANALYTICS_APP_USER: analytics_app
      ANALYTICS_APP_PASS: analytics_app
    ports:
      # Host 8081 → Airflow UI (8080 is the brain).
      - "8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./fixtures:/opt/airflow/fixtures:ro
      - ./fixtures/dbt_project:/opt/airflow/dbt_project:ro
      - ./hero/airflow/profiles.yml:/opt/airflow/dbt_profiles/profiles.yml:ro
    depends_on:
      airflow-db:
        condition: service_healthy
      warehouse:
        condition: service_healthy
      brain:
        condition: service_started

  # Offline bare git remote holding the dbt project (worker source-at-ref + the
  # V4 PR opener's push target). No GitHub, no network egress.
  git-remote:
    profiles: ["hero"]
    build:
      context: ./hero/git-remote
    volumes:
      - ./fixtures/dbt_project:/seed:ro
      - gitremote:/srv/git
    # git:// (host 9418) for a human/V4 to clone/inspect; reachable in-network as
    # git://git-remote:9418/analytics.git.
    ports:
      - "9418:9418"

volumes:
  pgdata:
  whdata:
  airflowdb:
  gitremote:
