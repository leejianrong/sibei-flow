# sibei-flow V1 — one `docker compose up` brings up the whole spine:
# postgres (source of truth) + brain (Rust) + worker (Python).
# ADR-0009 / R1.1 / V1-plan §"Packaging".

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sibei
      POSTGRES_PASSWORD: sibei
      POSTGRES_DB: sibei
    ports:
      # Host 5455 → container 5432 (avoids clashes with other local Postgres instances).
      - "5455:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibei -d sibei"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  brain:
    build:
      context: ./brain
    environment:
      DATABASE_URL: postgres://sibei:sibei@postgres:5432/sibei
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info,brain=info,sqlx=warn
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # V2: fixture warehouse (post-rename upstream) for get_schema drift detection.
  warehouse:
    image: postgres:16
    environment:
      POSTGRES_USER: sibei
      POSTGRES_PASSWORD: sibei
      POSTGRES_DB: warehouse
    ports:
      # Host 5456 → container 5432 (avoids clashes with other local Postgres).
      - "5456:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibei -d warehouse"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - whdata:/var/lib/postgresql/data
      - ./db/warehouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  worker:
    build:
      # Context is the repo root so the image can ship ./sandbox for lazy image
      # pre-bake; the worker Dockerfile lives under ./worker.
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgres://sibei:sibei@postgres:5432/sibei
      LEASE_SECONDS: "60"
      POLL_INTERVAL: "2.0"
      # V2 agent loop config
      WAREHOUSE_URL: postgres://sbflow_ro:sbflow_ro@warehouse:5432/warehouse
      REPO_ROOT: /repo
      LLM_PROVIDER: replay
      LLM_MODEL: claude-opus-4-8
      MAX_TURNS: "6"
      # V3 tiered verification sandbox (ADR-0006, B-S2).
      SANDBOX_IMAGE: sbflow-sandbox:latest
      SANDBOX_NETWORK: sibei-flow_default        # reach the warehouse from the sandbox
      SANDBOX_WORK_DIR: /tmp/sbflow-sandbox       # bind-mounted at the same host path
      SANDBOX_TIMEOUT: "120"
      # Tier-2: writable read-only DEV/SAMPLE connection (never prod). Comment
      # this out to demo the honest "sample run: not configured" disclosure.
      SAMPLE_WAREHOUSE_URL: postgres://sbflow_dev:sbflow_dev@warehouse:5432/warehouse
      SAMPLE_LIMIT: "10000"
    volumes:
      # Read-only checkout the agent reads failing source from (N7).
      - ./fixtures/dbt_project:/repo:ro
      # Docker-out-of-Docker: launch ephemeral sandbox containers on the host
      # daemon. The work dir is bind-mounted at the SAME absolute path so
      # `docker run -v <hostpath>:/project` resolves on the daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/sbflow-sandbox:/tmp/sbflow-sandbox
    depends_on:
      postgres:
        condition: service_healthy
      warehouse:
        condition: service_healthy
      brain:
        condition: service_started

volumes:
  pgdata:
  whdata:
