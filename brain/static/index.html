<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sibei-flow — runs</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #262b36; --fg: #e6e9ef;
      --muted: #8b93a3; --accent: #6ea8fe; --ok: #4ec98a; --drop: #b8859b;
      --warn: #d9a441;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 12px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 650; letter-spacing: .2px; }
    header .tag {
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 999px;
    }
    header .ro { color: var(--warn); border-color: var(--warn); }
    main { padding: 20px 24px; max-width: 1100px; }
    .hint { color: var(--muted); margin: 0 0 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 550; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: var(--panel); }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); white-space: nowrap; }
    .pill.no_fix { color: var(--muted); }
    .pill.out_of_scope { color: var(--drop); border-color: var(--drop); }
    .pill.queued, .pill.claimed { color: var(--accent); border-color: var(--accent); }
    .pill.done { color: var(--ok); border-color: var(--ok); }
    .pill.pr_proposed { color: var(--warn); border-color: var(--warn); }
    .pill.needs_prod_action { color: var(--warn); border-color: var(--warn); }
    .badge-unverified {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .4px;
      color: var(--warn); border: 1px solid var(--warn); border-radius: 6px;
      padding: 3px 8px; margin-bottom: 12px; text-transform: uppercase;
    }
    .badge-verified {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .4px;
      color: var(--ok); border: 1px solid var(--ok); border-radius: 6px;
      padding: 3px 8px; margin-bottom: 12px; text-transform: uppercase;
    }
    .badge-suppressed {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .4px;
      color: var(--drop); border: 1px solid var(--drop); border-radius: 6px;
      padding: 3px 8px; margin-bottom: 12px; text-transform: uppercase;
    }
    .badge-prodaction {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .4px;
      color: var(--warn); border: 1px solid var(--warn); border-radius: 6px;
      padding: 3px 8px; margin-bottom: 12px; text-transform: uppercase;
    }
    .card.prodaction { border-color: var(--warn); }
    .card.prodaction h3 { color: var(--warn); }
    .card.prodaction pre { white-space: pre-wrap; }
    .evidence { list-style: none; margin: 0; padding: 0; }
    .evidence li { padding: 5px 0; display: flex; align-items: baseline; gap: 10px; }
    .evidence .mark { font-weight: 700; width: 16px; display: inline-block; }
    .evidence .pass { color: var(--ok); }
    .evidence .fail { color: var(--drop); }
    .evidence .na { color: var(--muted); }
    .evidence .detail { color: var(--muted); font-size: 12px; }
    .risk { font-size: 12px; padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
    .risk.low { color: var(--ok); border-color: var(--ok); }
    .risk.medium { color: var(--warn); border-color: var(--warn); }
    .risk.high { color: var(--drop); border-color: var(--drop); }
    .confbar { height: 8px; border-radius: 999px; background: #0b0d11; border: 1px solid var(--border); overflow: hidden; margin: 8px 0; }
    .confbar > span { display: block; height: 100%; background: var(--ok); }
    .factors { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .factors .f { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; }
    .conf-head { display: flex; align-items: center; gap: 12px; }
    .conf-head .num { font-size: 20px; font-weight: 650; }
    details.log summary { cursor: pointer; color: var(--muted); font-size: 12px; }
    .card h3 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }
    pre.diff .add { color: var(--ok); }
    pre.diff .del { color: var(--drop); }
    pre.diff .hd { color: var(--accent); }
    .drift { color: var(--accent); }
    .oos { color: var(--drop); }
    #detail { margin-top: 8px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
    .kv { display: grid; grid-template-columns: 160px 1fr; gap: 6px 14px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; }
    pre { background: #0b0d11; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; font-size: 12px; }
    a.back { color: var(--accent); text-decoration: none; font-size: 13px; }
    .empty { color: var(--muted); padding: 24px 0; }
  </style>
</head>
<body>
  <header>
    <h1>sibei-flow</h1>
    <span class="tag">run history</span>
    <span class="tag ro">read-only — approval lives in the PR</span>
  </header>
  <main id="app"><p class="empty">Loading…</p></main>

  <script>
    const app = document.getElementById("app");

    function fmt(ts) { return ts ? new Date(ts).toLocaleString() : "—"; }
    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }
    function classCell(c) {
      if (!c) return "—";
      if (c.startsWith("out_of_scope")) return `<span class="oos">${esc(c)}</span>`;
      return `<span class="drift">${esc(c)}</span>`;
    }
    function pill(kind, val) { return val ? `<span class="pill ${esc(val)}">${esc(val)}</span>` : "—"; }
    function evRow(label, state, detail, log) {
      // state: "pass" | "fail" | "na"
      const mark = state === "pass" ? "✓" : state === "fail" ? "✗" : "—";
      const logHtml = log
        ? `<details class="log"><summary>log</summary><pre>${esc(log)}</pre></details>`
        : "";
      return `<li><span class="mark ${state}">${mark}</span>
        <span>${label}${detail ? ` <span class="detail">— ${esc(detail)}</span>` : ""}</span>
        ${logHtml}</li>`;
    }
    function renderEvidence(ev) {
      const t1 = ev.tier1 || {}, t2 = ev.tier2 || {}, os = ev.output_schema || {};
      const rows = [];
      rows.push(evRow(
        "compiled (dbt compile)",
        t1.passed ? "pass" : "fail",
        null, t1.log));
      if (t2.ran) {
        rows.push(evRow("ran on sample (dbt build)", t2.passed ? "pass" : "fail", null, t2.log));
      } else {
        rows.push(evRow("sample run", "na", "not configured", null));
      }
      const osState = os.changed === false ? "pass" : os.changed === true ? "fail" : "na";
      rows.push(evRow(
        os.changed === false ? "output schema unchanged"
          : os.changed === true ? "output schema changed" : "output schema",
        osState, os.detail, null));
      return `<ul class="evidence">${rows.join("")}</ul>`;
    }
    function renderConfidence(res) {
      const pct = res.confidence != null ? Math.round(res.confidence * 100) : null;
      const risk = res.risk_class ? `<span class="risk ${esc(res.risk_class)}">risk: ${esc(res.risk_class)}</span>` : "";
      let html = `<div class="conf-head">`;
      if (pct != null) html += `<span class="num">${pct}%</span><span class="detail">confidence</span>`;
      html += ` ${risk}</div>`;
      if (pct != null) html += `<div class="confbar"><span style="width:${pct}%"></span></div>`;
      if (res.factors && res.factors.length) {
        html += `<div class="factors">${res.factors.map(f => `<span class="f">${esc(f)}</span>`).join("")}</div>`;
      }
      return html;
    }
    function renderDiff(diff) {
      return esc(diff).split("\n").map(l => {
        if (l.startsWith("+++") || l.startsWith("---") || l.startsWith("@@")) return `<span class="hd">${l}</span>`;
        if (l.startsWith("+")) return `<span class="add">${l}</span>`;
        if (l.startsWith("-")) return `<span class="del">${l}</span>`;
        return l;
      }).join("\n");
    }

    async function routeList() {
      const r = await fetch("/api/runs");
      const { runs } = await r.json();
      if (!runs.length) { app.innerHTML = `<p class="empty">No runs yet. POST a failure to <code>/webhook</code>.</p>`; return; }
      const rows = runs.map(x => `
        <tr data-id="${x.id}">
          <td><code>${esc(x.repo || "—")}</code></td>
          <td>${classCell(x.failure_class)}</td>
          <td>${pill("state", x.state)}</td>
          <td>${x.outcome ? pill("outcome", x.outcome) : "—"}${x.pr_url ? ' <span title="PR opened">🔗</span>' : ""}</td>
          <td>${esc(x.task_id || "—")}</td>
          <td>${fmt(x.created_at)}</td>
        </tr>`).join("");
      app.innerHTML = `
        <p class="hint">Every failure the tool saw and what it did. Click a row for detail.</p>
        <table>
          <thead><tr><th>Repo</th><th>Class</th><th>State</th><th>Outcome</th><th>Task</th><th>Seen</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      app.querySelectorAll("tr[data-id]").forEach(tr =>
        tr.addEventListener("click", () => { location.hash = "#/run/" + tr.dataset.id; }));
    }

    async function routeDetail(id) {
      const r = await fetch("/api/runs/" + id);
      if (!r.ok) { app.innerHTML = `<a class="back" href="#/">← back</a><p class="empty">Run not found.</p>`; return; }
      const d = await r.json();
      const res = d.result || {};

      let sections = "";
      const ev = res.evidence;
      // needs_prod_action (V5): the drift is an incremental model hit by a
      // column removal/retype. sibei-flow does NOT draft a fix (that would
      // silently assume a prod migration); it surfaces a human recommendation
      // and opens no PR. Rendered prominently, in place of the usual cards.
      const isProdAction = d.outcome === "needs_prod_action";
      if (isProdAction) {
        sections += `<div class="badge-prodaction">⚑ needs prod action — no fix drafted</div>`;
        if (res.explanation) {
          sections += `<div class="card prodaction"><h3>Recommended prod action</h3>`
            + `<pre>${esc(res.explanation)}</pre>`
            + `<div class="detail" style="color:var(--muted);margin-top:8px">`
            + `sibei-flow holds no prod-write credentials and opens no PR for this — a human acts in prod.</div></div>`;
        }
      }
      // Status badge reflects REAL evidence (V3): verified when tier-1 passed;
      // suppressed when a non-compiling draft was gated to no_fix; unverified
      // only when no sandbox ran at all (legacy V2 shape).
      if (!isProdAction && ev == null && d.outcome === "pr_proposed") {
        sections += `<div class="badge-unverified">⚠ unverified — no sandbox evidence</div>`;
      } else if (ev != null && d.outcome === "no_fix") {
        sections += `<div class="badge-suppressed">suppressed — draft did not pass the compile gate</div>`;
      } else if (ev != null && ev.tier1 && ev.tier1.passed) {
        const label = (ev.tier2 && ev.tier2.ran && ev.tier2.passed)
          ? "✓ verified — compiled &amp; ran on sample"
          : "✓ verified — compiled (sample not run)";
        sections += `<div class="badge-verified">${label}</div>`;
      }
      // V4: the opened Pull Request (the single write action). A real link in
      // github mode; the branch + compare ref in offline mode.
      if (d.pr_url) {
        const isLink = /^https?:\/\//.test(d.pr_url);
        const link = isLink
          ? `<a href="${esc(d.pr_url)}" target="_blank" rel="noopener">${esc(d.pr_url)}</a>`
          : `<code>${esc(d.pr_url)}</code>`;
        sections += `<div class="card"><h3>Pull request</h3><div>${link}</div>`
          + (d.pr_branch ? `<div class="detail" style="color:var(--muted);margin-top:6px">branch <code>${esc(d.pr_branch)}</code> · opened ${fmt(d.pr_opened_at)}</div>` : "")
          + `</div>`;
      }
      if (res.explanation && !isProdAction) {
        sections += `<div class="card"><h3>Explanation</h3><div>${esc(res.explanation)}</div></div>`;
      }
      if (ev) {
        sections += `<div class="card"><h3>Verification evidence</h3>${renderEvidence(ev)}</div>`;
      }
      if (res.confidence != null || res.risk_class) {
        sections += `<div class="card"><h3>Confidence &amp; risk</h3>${renderConfidence(res)}</div>`;
      }
      if (res.diff) {
        sections += `<div class="card"><h3>Drafted diff (minimal)</h3><pre class="diff">${renderDiff(res.diff)}</pre></div>`;
      }
      if (res.transcript && res.transcript.length) {
        sections += `<div class="card"><h3>Reasoning transcript</h3><pre>${esc(res.transcript.join("\n"))}</pre></div>`;
      }

      app.innerHTML = `
        <a class="back" href="#/">← back to runs</a>
        <div class="card" style="margin-top:12px">
          <dl class="kv">
            <dt>Repo</dt><dd><code>${esc(d.repo)}</code></dd>
            <dt>Failure class</dt><dd>${classCell(d.failure_class)}</dd>
            <dt>State</dt><dd>${pill("state", d.state)}</dd>
            <dt>Outcome</dt><dd>${d.outcome ? pill("outcome", d.outcome) : "—"}</dd>
            <dt>Task</dt><dd>${esc(d.task_id || "—")}</dd>
            <dt>Node</dt><dd><code>${esc(d.node_uid || "—")}</code></dd>
            <dt>Run id</dt><dd><code>${esc(d.run_id || "—")}</code></dd>
            <dt>Created</dt><dd>${fmt(d.created_at)}</dd>
            <dt>Updated</dt><dd>${fmt(d.updated_at)}</dd>
            <dt>Lease expires</dt><dd>${fmt(d.lease_expires_at)}</dd>
          </dl>
        </div>
        ${sections}
        <div class="card">
          <h3>Normalized failure payload</h3>
          <pre>${esc(JSON.stringify(d.payload, null, 2))}</pre>
        </div>`;
    }

    function render() {
      const m = location.hash.match(/^#\/run\/([0-9a-f-]+)/i);
      if (m) routeDetail(m[1]); else routeList();
    }
    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
